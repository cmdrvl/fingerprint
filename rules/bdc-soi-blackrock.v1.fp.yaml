fingerprint_id: bdc-soi-blackrock.v1
parent: bdc-soi.v1
format: html

assertions:
  - name: wide_layout
    dominant_column_count:
      count: 6
      tolerance: 0
      sample_pages: 4
  - name: issuer_instrument_coupon_headers
    header_token_search:
      tokens:
        - "(?i)^issuer$"
        - "(?i)^instrument$"
        - "(?i)^coupon$"
        - "(?i)^amortized\\s+cost$"
      min_matches: 4
  - name: no_industry_or_spread_headers
    header_token_search:
      tokens:
        - "(?i)^industry$"
        - "(?i)business\\s+description"
        - "(?i)^spread$"
      min_matches: 0
      max_matches: 0

extract:
  - name: credit_portfolio_schedule
    type: table
    anchor_heading: "(?i)^credit portfolio$"
    index: 0
  - name: additional_credit_holdings_schedule
    type: table
    anchor_heading: "(?i)^additional credit holdings$"
    index: 0

content_hash:
  algorithm: blake3
  over:
    - credit_portfolio_schedule
    - additional_credit_holdings_schedule
